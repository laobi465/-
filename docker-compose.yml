# 代理池服务 - Docker Compose 部署
# 用法: docker compose up -d --build
services:
  proxy-pool:
    build: .
    image: proxy-pool:latest
    container_name: proxy-pool
    restart: unless-stopped
    ports:
      # API + WebSocket + 前端页面
      - "7999:7999"
      # 轮换隧道代理（HTTP + HTTPS CONNECT）
      - "8080:8080"
    volumes:
      # 持久化代理数据，重启不丢失
      - proxy-data:/app/server/data
    environment:
      # ===== 基础配置 =====
      HOST: 0.0.0.0
      API_PORT: 7999
      TUNNEL_HOST: 0.0.0.0
      TUNNEL_PORT: 8080
      # 隧道代理 Basic 认证账号密码（客户端需在代理 URL 中携带，格式 user:pass@host:port）
      # 生产环境强烈建议修改为强密码！默认 proxy/proxy 仅供测试。
      TUNNEL_USERNAME: proxy
      TUNNEL_PASSWORD: proxy
      DATA_FILE: /app/server/data/proxies.json
      # ===== 可选：对外公布的隧道代理地址（域名 / 公网 IP）=====
      # 留空时后端会自动检测服务器公网 IP 并显示在监控页面。
      # 若服务器在 NAT 后面、或想用域名对外服务，请在此指定，
      # 例如: TUNNEL_PUBLIC_HOST: proxy.example.com
      # TUNNEL_PUBLIC_HOST: ""
      # ===== 可选：受限网络下经 egress 网关访问外网 =====
      # 如果服务器本身禁止直连出站，可配置 HTTP 代理网关。
      # 留空则直连（绝大多数 VPS 不需要填）。
      # HTTP_PROXY: ""
      # HTTPS_PROXY: ""
    # 容器需要能访问外网以校验代理，保持 host 网络栈可选
    # network_mode: host

volumes:
  proxy-data:
